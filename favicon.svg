<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with rounded corners -->
  <rect width="100" height="100" fill="#FAF3EC" rx="18"/>
  
  <!-- Optional subtle border -->
  <rect width="100" height="100" fill="none" stroke="#E8DED2" stroke-width="2" rx="18"/>
  
  <!-- First S (higher, left) - centered as a group -->
  <text x="35" y="62" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="60" 
        font-weight="800" 
        fill="#FF7A5C"
        text-anchor="middle">S</text>
  
  <!-- Second S (lower, right) - centered as a group -->
  <text x="65" y="78" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="60" 
        font-weight="800" 
        fill="#FF7A5C"
        text-anchor="middle">S</text>
</svg>
