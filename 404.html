<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
  // GitHub Pages clean URL routing
  // This redirects /shop to /shop.html, /palette to /palette.html, etc.
  (function() {
    const path = window.location.pathname.replace(/\/$/, ''); // Remove trailing slash
    const routes = {
      '/shop': '/shop.html',
      '/palette': '/palette.html',
      '/about': '/about.html',
      // Individual season pages
      '/light-spring': '/light-spring.html',
      '/warm-spring': '/warm-spring.html',
      '/bright-spring': '/bright-spring.html',
      '/light-summer': '/light-summer.html',
      '/cool-summer': '/cool-summer.html',
      '/soft-summer': '/soft-summer.html',
      '/soft-autumn': '/soft-autumn.html',
      '/warm-autumn': '/warm-autumn.html',
      '/deep-autumn': '/deep-autumn.html',
      '/bright-winter': '/bright-winter.html',
      '/cool-winter': '/cool-winter.html',
      '/deep-winter': '/deep-winter.html'
    };
    
    if (routes[path]) {
      window.location.replace(routes[path]);
    } else if (path && path !== '/404.html') {
      // If no matching route, go to homepage
      window.location.replace('/');
    }
  })();
</script>
</head>
<body>
<p>Redirecting...</p>
</body>
</html>
